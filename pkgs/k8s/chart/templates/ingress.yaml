{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: drone-ingress
  labels:
    {{- include "drone.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # All traffic terminates at the frontend Service. Next.js then
          # rewrites /api/backend/* internally to the in-cluster `backend`
          # Service over the cluster network — see svcs/frontend/next.config.mjs
          # and the BACKEND_INTERNAL_URL env on the frontend deployment. This
          # keeps the same-origin / no-CORS contract the docker-compose stack
          # has, with one less hop for static assets.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: {{ .Values.frontend.port }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
{{- end }}
