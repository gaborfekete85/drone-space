apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    {{- include "drone.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "drone.frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "drone.frontend.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.port }}
          envFrom:
            # Non-secret env from the shared ConfigMap (NEXT_PUBLIC_* server
            # values, AWS_REGION etc. — backend-only keys are harmless).
            - configMapRef:
                name: drone-config
          env:
            # Match the value baked into routes-manifest.json at frontend
            # build time. Service name `backend` is locked in for the same
            # reason — see backend-service.yaml.
            - name: BACKEND_INTERNAL_URL
              value: "http://backend:{{ .Values.backend.port }}"
            - name: CLERK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: CLERK_SECRET_KEY
          {{- with .Values.frontend.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.frontend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
