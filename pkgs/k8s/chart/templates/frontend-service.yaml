apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    {{- include "drone.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "drone.frontend.selectorLabels" . | nindent 4 }}
